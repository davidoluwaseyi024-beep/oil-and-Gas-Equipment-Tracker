<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Equipment Tracker</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
</head>
<body class="login-page">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#0d1f3c"/>
          <path d="M8 28 L20 10 L32 28 Z" fill="none" stroke="#1a6b3c" stroke-width="2.5" stroke-linejoin="round"/>
          <circle cx="20" cy="22" r="4" fill="#1a6b3c"/>
          <line x1="12" y1="32" x2="28" y2="32" stroke="#4b9e6e" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="login-title">Equipment Tracker</h1>
      <p class="login-subtitle">Oil &amp; Gas Asset Management</p>

      {% if form.errors %}
        <div class="alert alert--error">
          Invalid username or password. Please try again.
        </div>
      {% endif %}

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert--{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_username">Username</label>
          <input class="form-input" type="text" name="username" id="id_username"
                 autocomplete="username" autofocus required placeholder="Enter your username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="id_password">Password</label>
          <input class="form-input" type="password" name="password" id="id_password"
                 autocomplete="current-password" required placeholder="Enter your password"/>
        </div>
        <input type="hidden" name="next" value="{{ next }}"/>
        <button type="submit" class="btn btn--primary btn--full">Sign In</button>
      </form>
      <p class="login-hint">Default: admin / admin123</p>
    </div>
  </div>
</body>
</html>
